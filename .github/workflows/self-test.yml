name: self-test
on:
  push:
    branches: [master, main, feat/**]
  pull_request:
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm test
      - run: pnpm --filter @ci-autopsy/core build
      - run: pnpm --filter @ci-autopsy/cli build
      - run: pnpm --filter @ci-autopsy/action build
